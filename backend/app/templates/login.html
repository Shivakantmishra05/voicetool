<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DreamHome Voice Ops Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/dashboard.css" rel="stylesheet">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <form class="login-panel" method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <h1>DreamHome Voice Ops</h1>
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username" autocomplete="username" required>
        <label class="form-label mt-3" for="password">Password</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="btn btn-primary w-100 mt-4" type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
